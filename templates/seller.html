<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم البائع | متجر الفخامة</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fcfbf7;
            padding: 40px;
        }
        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-top: 4px solid #b38728;
        }
        h2 { text-align: center; color: #111; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button {
            width: 100%; padding: 12px; background: #111; color: white;
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #b38728; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #777; text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>إضافة منتج جديد للمنصة 🚀</h2>
        <form id="add-product-form">
            <div class="form-group">
                <label>اسم المنتج:</label>
                <input type="text" id="p-name" required placeholder="مثال: عطر مسك فاخر">
            </div>
            <div class="form-group">
                <label>السعر (ر.س):</label>
                <input type="number" id="p-price" required placeholder="مثال: 250">
            </div>
            <div class="form-group">
                <label>رابط صورة المنتج:</label>
                <input type="url" id="p-img" required placeholder="ضع رابط الصورة من الإنترنت">
            </div>
            <button type="submit">نشر المنتج في المتجر فوراً</button>
        </form>
        <a href="/" class="back-link">← العودة للمتجر الرئيسي</a>
    </div>

    <script>
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;

            const response = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price: parseInt(price), img })
            });

            if (response.ok) {
                alert("تم نشر منتجك بنجاح في المتجر العام! 🎉");
                document.getElementById('add-product-form').reset();
            } else {
                alert("حدث خطأ أثناء النشر، تأكد من تشغيل السيرفر.");
            }
        });
    </script>
</body>
</html>
